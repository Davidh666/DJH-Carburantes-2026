<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaDuqQui Petrol - Sistema de Venta Controlada</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>RaDuqQui Petrol</h1>
    <p>Sistema de venta controlada y gestión de tanques</p>
  </header>

  <main>
    <section class="card">
      <h2>1. Configuración de la Empresa</h2>
      <form id="empresa-form">
        <div class="field-row">
          <label>Nombre</label>
          <input type="text" name="nombre" value="RaDuqQui Petrol" required />
        </div>
        <div class="field-row">
          <label>NIT</label>
          <input type="text" name="nit" required />
        </div>
        <div class="field-row">
          <label>Dirección</label>
          <input type="text" name="direccion" required />
        </div>
        <div class="field-row">
          <label>Ciudad</label>
          <input type="text" name="ciudad" required />
        </div>
        <div class="field-row">
          <label>Teléfono</label>
          <input type="text" name="telefono" />
        </div>
        <div class="field-row">
          <label>Stock mínimo alerta</label>
          <input type="number" name="stock_minimo_alerta" value="100" min="0" required />
        </div>
        <div class="field-row">
          <label>Holgura semanal</label>
          <input type="number" step="0.01" name="factor_holgura" value="0.10" required />
        </div>
        <div class="field-row">
          <label>Cupo base inicial</label>
          <input type="number" name="cupo_base_inicial" value="100" min="0" required />
        </div>
        <button type="submit">Guardar empresa</button>
      </form>
    </section>

    <section class="card">
      <h2>2. Registro de Tanques</h2>
      <form id="tanque-form">
        <div class="field-row">
          <label>Código</label>
          <input type="text" name="codigo" placeholder="T-01" required />
        </div>
        <div class="field-row">
          <label>Carburante</label>
          <select name="tipo_carburante" required>
            <option value="Gasolina">Gasolina</option>
            <option value="Diésel">Diésel</option>
          </select>
        </div>
        <div class="field-row">
          <label>Capacidad máxima (L)</label>
          <input type="number" name="capacidad_maxima" min="0" required />
        </div>
        <div class="field-row">
          <label>Stock mínimo seguridad</label>
          <input type="number" name="stock_minimo_seguridad" min="0" required />
        </div>
        <button type="submit">Registrar tanque</button>
      </form>
    </section>

    <section class="card">
      <h2>3. Registro de Clientes</h2>
      <form id="cliente-form">
        <div class="field-row">
          <label>Documento/NIT</label>
          <input type="text" name="documento" required />
        </div>
        <div class="field-row">
          <label>Nombre/Razón social</label>
          <input type="text" name="nombre" required />
        </div>
        <div class="field-row">
          <label>Placa del vehículo</label>
          <input type="text" name="placa" required />
        </div>
        <div class="field-row">
          <label>Tipo de cliente</label>
          <select name="tipo_cliente" required>
            <option value="Particular">Particular</option>
            <option value="Transporte Público">Transporte Público</option>
            <option value="Empresa">Empresa</option>
          </select>
        </div>
        <div class="field-row">
          <label>Estado</label>
          <select name="estado" required>
            <option value="Activo">Activo</option>
            <option value="Suspendido">Suspendido</option>
          </select>
        </div>
        <button type="submit">Registrar cliente</button>
      </form>
    </section>

    <section class="card">
      <h2>4. Venta Controlada</h2>
      <form id="venta-verificar-form" class="inline-form">
        <div class="field-row">
          <label>Documento</label>
          <input type="text" id="buscar-documento" />
        </div>
        <div class="field-row">
          <label>Placa</label>
          <input type="text" id="buscar-placa" />
        </div>
        <button type="submit">Ver límite</button>
      </form>
      <div id="limite-info" class="info-box"></div>

      <form id="venta-form">
        <div class="field-row">
          <label>Documento</label>
          <input type="text" name="documento" required />
        </div>
        <div class="field-row">
          <label>Placa</label>
          <input type="text" name="placa" required />
        </div>
        <div class="field-row">
          <label>Tipo carburante</label>
          <select name="tipo_carburante" required>
            <option value="Gasolina">Gasolina</option>
            <option value="Diésel">Diésel</option>
          </select>
        </div>
        <div class="field-row">
          <label>Litros</label>
          <input type="number" name="litros" min="1" required />
        </div>
        <div class="field-row">
          <label>Tanque</label>
          <select name="tanque_id" id="select-tanque" required></select>
        </div>
        <button type="submit">Procesar venta</button>
      </form>
      <div id="venta-result" class="info-box"></div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
